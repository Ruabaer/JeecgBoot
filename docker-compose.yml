version: '2'
services:
  jeecg-boot-mysql:
    build:
      context: ./jeecg-boot/db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
      TZ: Asia/Shanghai
    restart: always
    container_name: jeecg-boot-mysql
    image: jeecg-boot-mysql
    # ----------------------------------------------------------------
    # [开发环境 I/O 优化] 针对 Windows/WSL2 Bind Mount 场景，
    # 以下三项参数可大幅加速 SQL 初始化导入（牺牲极端断电下的数据一致性）。
    #
    # 生产环境请删除或替换为以下安全值：
    #   --innodb_flush_log_at_trx_commit=1  # 每次事务提交强制刷盘（默认值）
    #   --innodb_doublewrite=ON             # 启用双写缓冲（默认值）
    #   --sync_binlog=1                     # binlog 每次提交同步（默认值）
    # ----------------------------------------------------------------
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
      --max_allowed_packet=128M
      --default-authentication-plugin=caching_sha2_password
      --innodb_flush_log_at_trx_commit=0
      --innodb_doublewrite=0
      --sync_binlog=0
    ports:
      - 13306:3306
    networks:
      - jeecg-boot
    volumes:
      - ./data/mysql:/var/lib/mysql

  jeecg-boot-redis:
    image: registry.cn-hangzhou.aliyuncs.com/jeecgdocker/redis:5.0
    ports:
      - 6379:6379
    restart: always
    hostname: jeecg-boot-redis
    container_name: jeecg-boot-redis
    networks:
      - jeecg-boot
    volumes:
      - ./data/redis:/data

  jeecg-boot-system:
    build:
      context: ./jeecg-boot/jeecg-module-system/jeecg-system-start
    restart: on-failure
    depends_on:
      - jeecg-boot-mysql
      - jeecg-boot-redis
    container_name: jeecg-boot-system
    image: jeecg-boot-system
    hostname: jeecg-boot-system
    ports:
      - 8080:8080
    networks:
      - jeecg-boot
    volumes:
      - ./jeecg-boot/jeecg-module-system/jeecg-system-start:/jeecg-boot/app
    command: >
      sh -c "sleep 60 && exec java -Djava.security.egd=file:/dev/./urandom -jar /jeecg-boot/app/target/jeecg-system-start-3.9.2.jar"
  
  jeecg-vue:
    build:
      context: ./jeecgboot-vue3
    container_name: jeecgboot-vue3-nginx
    image: jeecgboot-vue3
    depends_on:
      - jeecg-boot-system
    networks:
      - jeecg-boot
    ports:
      - 80:80

  jeecg-boot-pgvector:
    image: registry.cn-hangzhou.aliyuncs.com/jeecgdocker/pgvector
    container_name: jeecg-boot-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vector_db
#    ports:
#      - 5432:5432
    restart: always
    networks:
      - jeecg-boot
    volumes:
      - ./data/pgvector:/var/lib/postgresql/data

networks:
  jeecg-boot:
    name: jeecg_boot
